<!DOCTYPE html>
<html lang="es">
<head>
  <script>!function(){document.write('<base href="'+(location.pathname.startsWith('/ChecadorGLOBAL/')?'/ChecadorGLOBAL/':'/')+'">');try{document.documentElement.dataset.theme=localStorage.getItem('eqs_theme')||'light'}catch(e){}}()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0369A1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Registrar asistencia · EQS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/checador.css">
</head>
<body>

<div class="app-shell">

  <!-- ── APP HEADER ─────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <button class="app-header__back" id="btn-atras" aria-label="Volver" data-i18n-title="Volver">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="app-header__info">
      <div class="app-header__title" id="header-title">Registrar asistencia</div>
      <div class="app-header__sub" id="header-sub" hidden></div>
    </div>
    <span class="app-header__tag" id="header-tag" hidden></span>
  </header>

  <!-- ── STEP BAR ───────────────────────────────────────────────────────────── -->
  <div class="step-bar">
    <div class="step-dot" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
    <div class="step-dot" id="dot-3"></div>
  </div>

  <!-- ── SCREEN: Loading / Permisos ────────────────────────────────────────── -->
  <div id="s-cargando" class="app-content app-content--center">
    <div class="spinner spinner--blue"></div>
    <p style="color:var(--tinta-3);font-size:.95rem" data-i18n>Solicitando permisos…</p>
  </div>

  <!-- ── SCREEN: Tipo ───────────────────────────────────────────────────────── -->
  <div id="s-tipo" class="app-content" hidden>
    <div class="tipo-greeting">
      <p class="tipo-greeting__nombre" id="saludo-nombre">Hola</p>
      <p class="tipo-greeting__sub" id="tipo-sub" data-i18n>¿Listo para iniciar tu jornada?</p>
    </div>

    <!-- Tarjeta de jornada en curso (sólo visible en modo salida) -->
    <div id="jornada-card" class="jornada-card" hidden>
      <div class="jornada-card__turno" id="jornada-turno"></div>
      <div class="jornada-card__timers">
        <div class="jornada-timer">
          <span class="jornada-timer__val" id="timer-elapsed">--</span>
          <span class="jornada-timer__lbl" data-i18n>En turno</span>
        </div>
        <div class="jornada-timer">
          <span class="jornada-timer__val" id="timer-remaining">--</span>
          <span class="jornada-timer__lbl" data-i18n>Para terminar</span>
        </div>
      </div>
    </div>

    <button id="btn-checar" class="tipo-card tipo-card--entrada">
      <div class="tipo-card__icon" id="checar-icon"></div>
      <div>
        <div class="tipo-card__label" id="checar-label">Registrar entrada</div>
        <div class="tipo-card__sub" id="checar-sub">Inicio de jornada</div>
      </div>
      <svg class="tipo-card__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <!-- ── SCREEN: Firma ─────────────────────────────────────────────────────── -->
  <div id="s-firma" class="app-content app-content--firma" hidden>
    <div>
      <h2 class="app-screen__title" data-i18n>Tu firma</h2>
      <p class="app-screen__sub" data-i18n>Usa tu dedo o lápiz para firmar en el recuadro</p>
    </div>
    <canvas id="canvas-firma" class="canvas-firma"></canvas>
    <p id="error-firma" class="error-msg" hidden></p>
  </div>

  <!-- ── SCREEN: Foto ───────────────────────────────────────────────────────── -->
  <div id="s-foto" class="app-content" hidden>
    <div id="sec-video">
      <p class="app-screen__sub" style="margin-bottom:12px" data-i18n>Mira directo a la cámara</p>
      <div class="camara-wrap">
        <div id="face-ring" class="face-ring" data-estado="cargando">
          <video id="video-preview" autoplay playsinline muted></video>
          <span class="face-ring__scan" aria-hidden="true"></span>
        </div>
      </div>
      <div id="face-chip" class="face-chip" role="status" aria-live="polite" data-estado="cargando">
        <span id="face-chip-icon" class="face-chip__icon" aria-hidden="true"></span>
        <span id="face-chip-txt" class="face-chip__txt" data-i18n>Cargando verificación…</span>
      </div>
    </div>
    <div id="sec-preview" hidden>
      <p class="app-screen__sub" style="margin-bottom:12px" data-i18n>Confirma que tu foto es clara</p>
      <div class="camara-wrap">
        <img id="img-preview" alt="Vista previa">
      </div>
    </div>
    <p id="error-camara" class="error-msg" hidden></p>
  </div>

  <!-- ── BOTTOM BARS ────────────────────────────────────────────────────────── -->
  <div id="btm-firma" class="app-bottom" hidden>
    <button id="btn-limpiar-firma" class="btn btn--secundario" style="flex:1">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>
      </svg>
      <span data-i18n>Limpiar</span>
    </button>
    <button id="btn-continuar-firma" class="btn btn--primario" style="flex:2">
      <span data-i18n>Continuar</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <div id="btm-foto" class="app-bottom" hidden>
    <button id="btn-continuar-sin-verificar" class="btn btn--secundario" style="flex:1" hidden data-i18n>Continuar sin verificar</button>
    <button id="btn-tomar-foto" class="btn btn--primario" style="flex:2" disabled aria-disabled="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span data-i18n>Tomar foto</span>
    </button>
  </div>

  <div id="btm-confirm" class="app-bottom" hidden>
    <button id="btn-repetir-foto" class="btn btn--secundario" style="flex:1" data-i18n>Repetir</button>
    <button id="btn-confirmar-foto" class="btn btn--primario" style="flex:2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span data-i18n>Confirmar</span>
    </button>
  </div>

</div><!-- /.app-shell -->

<!-- ── OVERLAY: Cargando ────────────────────────────────────────────────────── -->
<div id="overlay-cargando" hidden>
  <div class="spinner"></div>
  <p id="cargando-mensaje" data-i18n>Subiendo registro…</p>
</div>

<!-- ── OVERLAY: Éxito ────────────────────────────────────────────────────────── -->
<div id="overlay-exito" hidden>
  <div class="exito-inner">
    <svg id="exito-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    <p id="exito-titulo" class="exito-titulo"></p>
    <div class="exito-chips">
      <span id="exito-hora"  class="exito-chip"></span>
      <span id="exito-fecha" class="exito-chip exito-chip--dim"></span>
    </div>
    <span id="exito-turno" class="exito-turno" hidden></span>
    <a id="exito-ubic" class="exito-ubic" target="_blank" rel="noopener" hidden>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="exito-ubic-txt" data-i18n>Obteniendo ubicación…</span>
    </a>
    <div id="exito-media" class="exito-media" hidden></div>
    <p id="exito-duracion" class="exito-duracion" hidden></p>
  </div>
</div>

<script type="module" src="assets/js/checador.js"></script>
</body>
</html>
