<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0369A1">
  <title>Página no encontrada · EQS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/estilos.css">
</head>
<body>

<div class="page-center">

  <div class="page-center__icon" style="background:var(--primario-bg)">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primario)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="11" y1="8" x2="11" y2="12"/>
      <line x1="11" y1="16" x2="11.01" y2="16"/>

  </div>

  <div>
    <div style="font-family:'Lexend',sans-serif;font-size:5rem;font-weight:700;color:var(--tinta);letter-spacing:-.04em;line-height:1">404</div>
    <h1 class="page-center__title" style="margin-top:8px">Página no encontrada</h1>

      La dirección que escribiste no existe o fue movida.
    </p>

  <a href="/" class="btn btn--primario" style="max-width:280px;width:100%;text-decoration:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>

  </a>

</div>
