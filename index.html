<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0369A1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>EQS Checador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/estilos.css">
</head>
<body>

  <!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
  <section id="s-login" class="pantalla" hidden>
    <div class="tarjeta">
      <div class="brand-header">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="brand-text-block">
          <span class="brand-name">EQS Checador</span>
          <span class="brand-sub">Acceso seguro</span>
        </div>
      </div>

      <hr class="divider">

      <form id="form-pin" novalidate>
        <label for="input-pin">Ingresa tu PIN</label>
        <input id="input-pin" class="input-pin" type="password" inputmode="numeric"
          pattern="\d*" maxlength="10" autocomplete="current-password" placeholder="••••">
        <p id="error-pin" class="error-msg" hidden></p>
        <button id="btn-continuar-pin" type="submit" class="btn btn--primario">Continuar</button>
      </form>
    </div>
  </section>

  <!-- ── MENÚ ──────────────────────────────────────────────────────────────── -->
  <section id="s-menu" class="pantalla" hidden>
    <div class="tarjeta">
      <div class="brand-header">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="brand-text-block">
          <span class="brand-name">EQS Checador</span>
          <span class="brand-sub">Control de asistencia</span>
        </div>
      </div>

      <hr class="divider">

      <div class="saludo-bloque">
        <span class="saludo-sup">Bienvenido</span>
        <p id="saludo">–</p>
      </div>

      <div class="menu-botones">
        <button id="btn-checar" class="btn btn--primario">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Checar asistencia
        </button>
        <button id="btn-historial" class="btn btn--secundario">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/>
          </svg>
          Ver historial
        </button>
      </div>

      <button id="btn-cerrar-sesion" class="btn btn--peligro btn--sm">Cerrar sesión</button>
    </div>
  </section>

  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
