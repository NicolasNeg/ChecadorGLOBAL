<!DOCTYPE html>
<html lang="es">
<head>
  <script>!function(){var b=document.createElement('base');b.href=location.hostname==='nicolasneg.github.io'?'/ChecadorGLOBAL/':'/';document.head.appendChild(b)}()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0369A1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>EQS Checador</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

  <!-- Acceso al panel admin (esquina superior). base resuelve el prefijo en ambos hosts -->
  <a href="admin/" class="admin-access" aria-label="Acceso administrativo">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    Admin
  </a>

  <!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
  <section id="s-login" class="pantalla" hidden>
    <div class="tarjeta">
      <div class="brand-header">
        <div class="brand-icon brand-icon--logo">
          <img src="assets/imgs/logo_.png" alt="EQS México">
        </div>
        <div class="brand-text-block">
          <span class="brand-name">EQS Checador</span>
          <span class="brand-sub">Acceso seguro</span>
        </div>
      </div>

      <hr class="divider">

      <form id="form-pin" novalidate>
        <label for="input-pin">Ingresa tu PIN</label>
        <div class="pin-wrap">
          <input id="input-pin" class="input-pin" type="password" inputmode="numeric"
            pattern="\d*" maxlength="10" autocomplete="current-password" placeholder="••••">
          <button type="button" id="btn-ver-pin" class="ver-pin" aria-label="Mostrar PIN" aria-pressed="false">
            <svg class="eye eye--open" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye eye--off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </button>
        </div>
        <p id="error-pin" class="error-msg" role="alert" hidden></p>
        <button id="btn-continuar-pin" type="submit" class="btn btn--primario">
          <span id="pin-btn-label">Continuar</span>
          <svg id="pin-btn-spinner" class="btn__spin" hidden width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,.3)" stroke-width="2.5"/>
            <path d="M12 3a9 9 0 0 1 9 9" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </form>
    </div>
  </section>

  <!-- ── MENÚ ──────────────────────────────────────────────────────────────── -->
  <section id="s-menu" class="pantalla" hidden>
    <div class="tarjeta">
      <div class="brand-header">
        <div class="brand-icon brand-icon--logo">
          <img src="assets/imgs/logo_.png" alt="EQS México">
        </div>
        <div class="brand-text-block">
          <span class="brand-name">EQS Checador</span>
          <span class="brand-sub">Control de asistencia</span>
        </div>
      </div>

      <hr class="divider">

      <div class="saludo-bloque">
        <div class="saludo-avatar" id="saludo-avatar" aria-hidden="true">–</div>
        <div class="saludo-textos">
          <span class="saludo-sup" id="saludo-hora">Bienvenido</span>
          <p id="saludo">–</p>
          <span class="saludo-meta" id="saludo-meta" hidden></span>
        </div>
        <span class="saludo-num" id="saludo-num" hidden></span>
      </div>

      <div class="menu-botones">
        <button id="btn-checar" class="btn btn--primario">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Checar asistencia
        </button>
        <button id="btn-historial" class="btn btn--secundario">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/>
          </svg>
          Ver historial
        </button>
        <button id="btn-turnos" class="btn btn--secundario">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Mi turno
        </button>
      </div>

      <button id="btn-cerrar-sesion" class="btn btn--peligro btn--sm">Cerrar sesión</button>
    </div>
  </section>

  <!-- ── MI TURNO ──────────────────────────────────────────────────────────── -->
  <section id="s-turnos" class="pantalla" hidden>
    <div class="tarjeta">
      <div class="brand-header">
        <div class="brand-icon brand-icon--logo">
          <img src="assets/imgs/logo_.png" alt="EQS México">
        </div>
        <div class="brand-text-block">
          <span class="brand-name">Mi horario</span>
          <span class="brand-sub">Turnos de la semana</span>
        </div>
      </div>

      <hr class="divider">

      <div id="turnos-lista" class="turnos-lista"></div>

      <button id="btn-turnos-volver" class="btn btn--secundario btn--sm">Volver</button>
    </div>
  </section>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
