<!DOCTYPE html>
<html lang="es">
<head>
  <script>!function(){var b=document.createElement('base');b.href=location.hostname==='nicolasneg.github.io'?'/ChecadorGLOBAL/':'/';document.head.appendChild(b)}()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EQS Admin · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/estilos-admin.css">
</head>
<body>

<div class="admin-shell" id="admin-shell">

  <!-- ── Sidebar overlay (mobile) ─────────────────────────────── -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ── Sidebar ────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menú principal">
    <div class="sidebar__brand">
      <div class="sidebar__brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <div class="sidebar__brand-name">EQS Checador</div>
        <div class="sidebar__brand-sub" id="admin-rol-badge">Admin</div>
      </div>
    </div>

    <div class="sidebar__user">
      <div class="sidebar__avatar" aria-hidden="true">A</div>
      <div class="sidebar__user-info">
        <div class="sidebar__user-name" id="admin-nombre">—</div>
        <div class="sidebar__user-role">Sesión activa</div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <div class="sidebar__section-label">Principal</div>
      <a href="#overview" class="sidebar__link active" data-panel="overview">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Resumen
      </a>
      <a href="#asistencia" class="sidebar__link" data-panel="asistencia">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Asistencia
      </a>

      <div class="sidebar__section-label" data-rh-only>Configuración</div>
      <a href="#plazas" class="sidebar__link" data-panel="plazas" data-rh-only>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Plazas
      </a>
      <a href="#turnos" class="sidebar__link" data-panel="turnos" data-rh-only>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Turnos
      </a>

      <div class="sidebar__section-label">Gestión</div>
      <a href="#empleados" class="sidebar__link" data-panel="empleados">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Empleados
      </a>
      <a href="#auditoria" class="sidebar__link" data-panel="auditoria" data-rh-only>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Log de Auditoría
      </a>
    </nav>

    <div class="sidebar__footer">
      <button class="sidebar__link sidebar__link--logout" id="btn-logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- ── Main area ─────────────────────────────────────────────── -->
  <div class="admin-main">

    <!-- Header -->
    <header class="admin-header">
      <button class="admin-header__hamburger" id="btn-hamburger" aria-label="Abrir menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 class="admin-header__title" id="page-title">Resumen</h1>
      <div class="admin-header__right">
        <a href="../../" class="abtn abtn--ghost" style="font-size:.82rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          App
        </a>
      </div>
    </header>

    <!-- Panels -->
    <main class="admin-content" id="admin-content">

      <div id="panel-overview" class="admin-panel" data-title="Resumen" hidden></div>
      <div id="panel-asistencia" class="admin-panel" data-title="Asistencia en tiempo real" hidden></div>
      <div id="panel-plazas" class="admin-panel" data-title="Plazas" hidden></div>
      <div id="panel-turnos" class="admin-panel" data-title="Turnos" hidden></div>
      <div id="panel-empleados" class="admin-panel" data-title="Empleados" hidden></div>
      <div id="panel-auditoria" class="admin-panel" data-title="Log de Auditoría" hidden></div>

    </main>
  </div><!-- /admin-main -->
</div><!-- /admin-shell -->

<!-- ── Shared modal ────────────────────────────────────────────── -->
<div id="ad-modal" class="ad-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="ad-modal__card">
    <div class="ad-modal__header">
      <h3 id="modal-title" class="ad-modal__title">Modal</h3>
      <button class="abtn abtn--icon" id="modal-close" aria-label="Cerrar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="ad-modal__body" id="modal-body"></div>
    <div class="ad-modal__footer">
      <button class="abtn abtn--ghost" id="modal-cancel">Cancelar</button>
      <button class="abtn abtn--primary" id="modal-save">
        <span id="modal-save-label">Guardar</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Toast container ─────────────────────────────────────────── -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<script type="module" src="assets/js/admin/dashboard.js"></script>
<script type="module">
  // Wire modal close buttons (no module needed)
  document.getElementById('modal-close').addEventListener('click',  () => { document.getElementById('ad-modal').hidden = true; });
  document.getElementById('modal-cancel').addEventListener('click', () => { document.getElementById('ad-modal').hidden = true; });
  // Close modal on backdrop click
  document.getElementById('ad-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.hidden = true;
  });
  // Close sidebar overlay on click
  document.getElementById('sidebar-overlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
  });
</script>
</body>
</html>
