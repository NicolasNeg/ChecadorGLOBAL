<!DOCTYPE html>
<html lang="es">

<head>
  <script>!function () { document.write('<base href="'+(location.pathname.startsWith('/ChecadorGLOBAL/')?'/ChecadorGLOBAL/':'/')+'">') }()</script>
  <script>!function () { try { var t = localStorage.getItem('eqs_admin_theme') || 'system'; var d = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches); document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light') } catch (e) { } }()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-marca-titulo="Dashboard">EQS Admin · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/estilos-admin.css">
</head>

<body>

  <div class="admin-shell" id="admin-shell">

    <!-- ── Sidebar overlay (mobile) ─────────────────────────────── -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ── Sidebar ────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menú principal">
      <div class="sidebar__brand">
        <div class="sidebar__brand-icon sidebar__brand-icon--logo">
          <img src="assets/imgs/logo_.png" alt="EQS México" data-marca-logo>
        </div>
        <div class="sidebar__brand-name" data-marca>EQS Checador</div>
      </div>

      <nav class="sidebar__nav">
        <details class="sidebar__group" open>
          <summary class="sidebar__section-label"><span data-i18n>Principal</span>
            <svg class="sidebar__group-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <a href="#overview" class="sidebar__link active" data-panel="overview">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" />
            </svg>
            <span data-i18n>Resumen</span>
          </a>
          <a href="#asistencia" class="sidebar__link" data-panel="asistencia" data-perm="asistencia.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <span data-i18n>Asistencia</span>
          </a>
        </details>

        <details class="sidebar__group" data-perm-group open>
          <summary class="sidebar__section-label"><span data-i18n>Configuración</span>
            <svg class="sidebar__group-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <a href="#plazas" class="sidebar__link" data-panel="plazas" data-perm="plazas.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" />
            </svg>
            <span data-i18n>Plazas</span>
          </a>
          <a href="#puestos" class="sidebar__link" data-panel="puestos" data-perm="puestos.editar">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" /><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
            </svg>
            <span data-i18n>Puestos</span>
          </a>
        </details>

        <details class="sidebar__group" open>
          <summary class="sidebar__section-label"><span data-i18n>Gestión</span>
            <svg class="sidebar__group-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <a href="#turnos" class="sidebar__link" data-panel="turnos" data-perm="turnos.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
            </svg>
            <span data-i18n>Turnos</span>
          </a>
          <a href="#empleados" class="sidebar__link" data-panel="empleados" data-perm="empleados.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" />
            </svg>
            <span data-i18n>Empleados</span>
          </a>
          <a href="#gafetes" class="sidebar__link" data-panel="gafetes" data-perm="gafetes.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="16" rx="2" /><circle cx="9" cy="10" r="2" /><path d="M7 16c0-1.5 1-2.5 2-2.5s2 1 2 2.5" /><line x1="14" y1="9" x2="18" y2="9" /><line x1="14" y1="13" x2="18" y2="13" />
            </svg>
            <span data-i18n>Gafetes</span>
          </a>
          <a href="#avisos" class="sidebar__link" data-panel="avisos" data-perm="avisos.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 11l18-5v12L3 14v-3z" /><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6" />
            </svg>
            <span data-i18n>Avisos</span>
          </a>
          <a href="#historial" class="sidebar__link" data-panel="historial" data-perm="asistencia.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 3v18h18" /><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3" />
            </svg>
            <span data-i18n>Historial</span>
          </a>
          <a href="#cambios" class="sidebar__link" data-panel="cambios" data-perm="auditoria.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" /><polyline points="12 7 12 12 15 14" /><path d="M3.5 8.5 5 6" />
            </svg>
            <span data-i18n>Historial de cambios</span>
          </a>
          <a href="#auditoria" class="sidebar__link" data-panel="auditoria" data-perm="auditoria.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" />
            </svg>
            <span data-i18n>Log de Auditoría</span>
          </a>
        </details>

        <details class="sidebar__group" data-perm-group open>
          <summary class="sidebar__section-label"><span data-i18n>Sistema</span>
            <svg class="sidebar__group-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <a href="#usuarios" class="sidebar__link" data-panel="usuarios" data-perm="usuarios.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span data-i18n>Usuarios</span>
          </a>
          <a href="#administracion" class="sidebar__link" data-panel="administracion" data-perm="config.ver">
            <svg class="sidebar__link-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <span data-i18n>Administración</span>
          </a>
        </details>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__profile">
          <div class="sidebar__avatar sidebar__avatar--sm" aria-hidden="true">A</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="admin-nombre-foot">—</div>
            <div class="sidebar__user-role" id="admin-rol-badge">Admin</div>
          </div>
          <a href="#ajustes" class="sidebar__icon-btn sidebar__link" data-panel="ajustes" data-i18n-title="Ajustes" title="Ajustes" aria-label="Ajustes">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </a>
          <button class="sidebar__icon-btn" id="btn-logout" data-i18n-title="Cerrar sesión" title="Cerrar sesión" aria-label="Cerrar sesión">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ── Main area ─────────────────────────────────────────────── -->
    <div class="admin-main">

      <!-- Header -->
      <header class="admin-header">
        <button class="admin-header__hamburger" id="btn-hamburger" data-i18n-title="Abrir menú" aria-label="Abrir menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <button class="admin-header__collapse" id="btn-collapse" data-i18n-title="Colapsar menú" aria-label="Colapsar menú" title="Colapsar menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" /><line x1="9" y1="3" x2="9" y2="21" />
          </svg>
        </button>
        <h1 class="admin-header__title" id="page-title">Resumen</h1>
        <div class="admin-header__right">
          <!-- Selector de plaza personalizado (animado) -->
          <div class="hplaza" id="header-plaza">
            <button class="hplaza__trigger" id="hplaza-trigger" aria-haspopup="listbox" aria-expanded="false">
              <svg class="hplaza__pin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" />
              </svg>
              <span class="hplaza__label" id="hplaza-label">Seleccionar Plaza</span>
              <svg class="hplaza__chev" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /></svg>
            </button>
            <ul class="hplaza__menu" id="hplaza-menu" role="listbox" aria-label="Plazas" hidden></ul>
          </div>

          <button class="hicon-btn" id="btn-theme" data-i18n-title="Cambiar tema" aria-label="Cambiar tema" title="Cambiar tema">
            <svg class="hicon-btn__moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
            <svg class="hicon-btn__sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></svg>
          </button>

          <a href="index.html" class="hicon-btn" data-i18n-title="Ir a la app" aria-label="Ir a la app" title="Ir a la app">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" />
            </svg>
          </a>
        </div>
      </header>

      <!-- Panels -->
      <main class="admin-content" id="admin-content">

        <div id="panel-overview" class="admin-panel" data-title="Resumen" hidden></div>
        <div id="panel-asistencia" class="admin-panel" data-title="Asistencia en tiempo real" hidden></div>
        <div id="panel-plazas" class="admin-panel" data-title="Plazas" hidden></div>
        <div id="panel-puestos" class="admin-panel" data-title="Puestos" hidden></div>
        <div id="panel-turnos" class="admin-panel" data-title="Turnos" hidden></div>
        <div id="panel-empleados" class="admin-panel" data-title="Empleados" hidden></div>
        <div id="panel-gafetes" class="admin-panel" data-title="Gafetes" hidden></div>
        <div id="panel-avisos" class="admin-panel" data-title="Avisos" hidden></div>
        <div id="panel-historial" class="admin-panel" data-title="Historial por empleado" hidden></div>
        <div id="panel-cambios" class="admin-panel" data-title="Historial de cambios" hidden></div>
        <div id="panel-auditoria" class="admin-panel" data-title="Log de Auditoría" hidden></div>
        <div id="panel-usuarios" class="admin-panel" data-title="Usuarios" hidden></div>
        <div id="panel-administracion" class="admin-panel" data-title="Administración" hidden></div>
        <div id="panel-ajustes" class="admin-panel" data-title="Ajustes" hidden></div>

      </main>
    </div><!-- /admin-main -->
  </div><!-- /admin-shell -->

  <!-- ── Shared modal ────────────────────────────────────────────── -->
  <div id="ad-modal" class="ad-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="ad-modal__card">
      <div class="ad-modal__header">
        <h3 id="modal-title" class="ad-modal__title">Modal</h3>
        <button class="abtn abtn--icon" id="modal-close" data-i18n-title="Cerrar" aria-label="Cerrar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="ad-modal__body" id="modal-body"></div>
      <div class="ad-modal__footer">
        <button class="abtn abtn--ghost" id="modal-cancel" data-i18n>Cancelar</button>
        <button class="abtn abtn--primary" id="modal-save">
          <span id="modal-save-label" data-i18n>Guardar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Toast container ─────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script type="module" src="assets/js/marca.js"></script>
  <script type="module" src="assets/js/admin/dashboard.js"></script>
  <script type="module">
    // Wire modal close buttons (no module needed)
    document.getElementById('modal-close').addEventListener('click', () => { document.getElementById('ad-modal').hidden = true; });
    document.getElementById('modal-cancel').addEventListener('click', () => { document.getElementById('ad-modal').hidden = true; });
    // El modal NO se cierra al hacer clic fuera: un misclic borraría lo escrito.
    // Solo se cierra con la X o "Cancelar".
    // Close sidebar overlay on click
    document.getElementById('sidebar-overlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
    });
  </script>
</body>

</html>
