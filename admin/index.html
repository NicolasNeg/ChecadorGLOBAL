<!DOCTYPE html>
<html lang="es">
<head>
  <script>!function(){var b=document.createElement('base');b.href=location.hostname==='nicolasneg.github.io'?'/ChecadorGLOBAL/':'/';document.head.appendChild(b)}()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EQS Admin · Acceso</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/estilos-admin.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand__icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <div class="login-brand__name">EQS Checador</div>
        <div class="login-brand__sub">Panel Administrativo</div>
      </div>
    </div>

    <form id="form-login" novalidate>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" class="form-input" type="email" autocomplete="email"
               placeholder="admin@empresa.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div style="position:relative">
          <input id="password" class="form-input" type="password" autocomplete="current-password"
                 placeholder="••••••••" required style="padding-right:44px">
          <button type="button" id="btn-toggle-pass" class="abtn abtn--icon"
                  style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;color:#64748B"
                  aria-label="Mostrar/ocultar contraseña">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <p id="login-error" class="error-inline" hidden></p>

      <button type="submit" class="abtn abtn--primary abtn--lg" id="btn-submit" style="width:100%;margin-top:8px">
        <span id="btn-label">Iniciar sesión</span>
        <div class="ad-spinner" id="btn-spinner" hidden style="width:16px;height:16px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff"></div>
      </button>
    </form>
  </div>

  <script type="module">
    import { loginAdmin, getAdminSession } from './assets/js/admin/auth.js';
    import { BASE } from './assets/js/config.js';

    // If already logged in, skip to dashboard
    if (getAdminSession()) location.replace(BASE + '/admin/dashboard/');

    const form    = document.getElementById('form-login');
    const errEl   = document.getElementById('login-error');
    const btnSub  = document.getElementById('btn-submit');
    const label   = document.getElementById('btn-label');
    const spinner = document.getElementById('btn-spinner');
    const passIn  = document.getElementById('password');
    const toggleBtn = document.getElementById('btn-toggle-pass');

    toggleBtn.addEventListener('click', () => {
      const isPass = passIn.type === 'password';
      passIn.type = isPass ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      btnSub.disabled = true;
      label.hidden = true;
      spinner.hidden = false;

      const email    = document.getElementById('email').value.trim();
      const password = passIn.value;

      try {
        const res = await loginAdmin(email, password);
        if (res.ok) {
          location.replace(BASE + '/admin/dashboard/');
          return;
        }
        errEl.textContent = res.error || 'No se pudo iniciar sesión.';
        errEl.hidden = false;
      } catch (err) {
        errEl.textContent = err.message || 'Error inesperado.';
        errEl.hidden = false;
      } finally {
        btnSub.disabled = false;
        label.hidden = false;
        spinner.hidden = true;
      }
    });
  </script>
</body>
</html>
