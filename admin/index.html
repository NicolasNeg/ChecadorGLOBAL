<!DOCTYPE html>
<html lang="es">
<head>
  <script>!function(){document.write('<base href="'+(location.pathname.startsWith('/ChecadorGLOBAL/')?'/ChecadorGLOBAL/':'/')+'">')}()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-marca-titulo="Acceso">EQS Admin · Acceso</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/estilos-admin.css">
</head>
<body class="login-body">

  <div class="login-shell">

    <!-- Panel de marca -->
    <aside class="login-aside">
      <div class="login-brand">
        <div class="login-brand__icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div>
          <div class="login-brand__name" data-marca>EQS Checador</div>
          <div class="login-brand__sub" data-i18n>Panel Administrativo</div>
        </div>
      </div>

      <div class="login-aside__hero">
        <h1 data-i18n>Gestiona tu fuerza laboral con claridad.</h1>
        <ul class="login-points">
          <li>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-i18n>Asistencia en tiempo real</span>
          </li>
          <li>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-i18n>Geocercas y turnos por plaza</span>
          </li>
          <li>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-i18n>Reportes e historial por empleado</span>
          </li>
        </ul>
      </div>

      <div class="login-aside__foot" data-i18n>Acceso restringido a personal autorizado</div>
    </aside>

    <!-- Panel de formulario -->
    <main class="login-main">
      <div class="login-main__top">
        <a href="index.html" class="login-back">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          <span data-i18n>Volver al checador</span>
        </a>
        <div id="login-lang"></div>
      </div>

      <div class="login-form-wrap">
        <img src="assets/imgs/logo_.png" alt="EQS México" class="login-logo" data-marca-logo>
        <h2 class="login-title" data-i18n>Iniciar sesión</h2>
        <p class="login-hint" data-i18n>Ingresa con tu cuenta de administrador.</p>

        <form id="form-login" novalidate>
      <div class="form-group">
        <label for="email" data-i18n>Correo electrónico</label>
        <input id="email" class="form-input" type="email" autocomplete="email"
               placeholder="admin@empresa.com" required>
      </div>
      <div class="form-group">
        <label for="password" data-i18n>Contraseña</label>
        <div style="position:relative">
          <input id="password" class="form-input" type="password" autocomplete="current-password"
                 placeholder="••••••••" required style="padding-right:44px">
          <button type="button" id="btn-toggle-pass" class="abtn abtn--icon eye-toggle"
                  style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;color:#64748B"
                  aria-label="Mostrar contraseña" data-i18n-title="Mostrar contraseña" aria-pressed="false">
            <svg class="eye eye--open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye eye--off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
          </button>
        </div>
      </div>

      <p id="login-error" class="error-inline" hidden></p>

      <button type="submit" class="abtn abtn--primary abtn--lg" id="btn-submit" style="width:100%;margin-top:8px">
        <span id="btn-label" data-i18n>Iniciar sesión</span>
        <div class="ad-spinner" id="btn-spinner" hidden style="width:16px;height:16px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff"></div>
      </button>
        </form>
      </div>
    </main>

  </div>

  <script type="module" src="assets/js/marca.js"></script>
  <script type="module">
    import { loginAdmin, getAdminSession } from './assets/js/admin/auth.js';
    import { BASE } from './assets/js/config.js';
    import { t, applyI18n, mountLangToggle } from './assets/js/i18n.js';

    // If already logged in, skip to dashboard
    if (getAdminSession()) location.replace(BASE + '/admin/dashboard/');

    mountLangToggle(document.getElementById('login-lang'));
    applyI18n(document);
    window.addEventListener('langchange', () => applyI18n(document));

    const form    = document.getElementById('form-login');
    const errEl   = document.getElementById('login-error');
    const btnSub  = document.getElementById('btn-submit');
    const label   = document.getElementById('btn-label');
    const spinner = document.getElementById('btn-spinner');
    const passIn  = document.getElementById('password');
    const toggleBtn = document.getElementById('btn-toggle-pass');

    // Ubicación obligatoria: se pide al cargar (lanza el prompt) y se exige al
    // entrar. Sin ubicación no se permite iniciar sesión.
    let adminLoc = null;
    function pedirUbicacion() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (p) => resolve(`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      });
    }
    pedirUbicacion().then((loc) => { adminLoc = loc; });

    toggleBtn.addEventListener('click', () => {
      const isPass = passIn.type === 'password';
      passIn.type = isPass ? 'text' : 'password';
      toggleBtn.classList.toggle('revealed', isPass);
      toggleBtn.setAttribute('aria-pressed', String(isPass));
      toggleBtn.setAttribute('aria-label', t(isPass ? 'Ocultar contraseña' : 'Mostrar contraseña'));
      passIn.focus();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      btnSub.disabled = true;
      label.hidden = true;
      spinner.hidden = false;

      const email    = document.getElementById('email').value.trim();
      const password = passIn.value;

      try {
        if (!adminLoc) adminLoc = await pedirUbicacion();
        if (!adminLoc) {
          errEl.textContent = t('Activa la ubicación para iniciar sesión.');
          errEl.hidden = false;
          return;
        }
        const res = await loginAdmin(email, password, adminLoc);
        if (res.ok) {
          location.replace(BASE + '/admin/dashboard/');
          return;
        }
        errEl.textContent = res.error || t('No se pudo iniciar sesión.');
        errEl.hidden = false;
      } catch (err) {
        errEl.textContent = err.message || t('Error inesperado.');
        errEl.hidden = false;
      } finally {
        btnSub.disabled = false;
        label.hidden = false;
        spinner.hidden = true;
      }
    });
  </script>
</body>
</html>
